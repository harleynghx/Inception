services:
  nginx:
    build:
      context: requirements/nginx
      dockerfile: Dockerfile
    container_name: nginx
    ports:
      - "443:443"
    restart: always
    networks:
      - inception
    volumes:
      - wordpress_data:/var/www/html
    # NGINX should wait for WordPress to boot first
    depends_on:
      - wordpress

  mariadb:
    build:
      context: requirements/mariadb
      dockerfile: Dockerfile
    container_name: mariadb
    restart: always
    networks:
      - inception
    env_file:
      - .env
    volumes:
      - mariadb_data:/var/lib/mysql

  wordpress:
    build:
      context: requirements/wordpress
      dockerfile: Dockerfile
    container_name: wordpress
    restart: always
    networks:
      - inception
    env_file:
      - .env
    volumes:
      # This maps the same volume as NGINX, so they share the website files
      - wordpress_data:/var/www/html
    # WordPress should wait for MariaDB to boot first
    depends_on:
      - mariadb

networks:
  inception:
    driver: bridge

volumes:
  wordpress_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hang/data/wordpress
      
  mariadb_data:
    driver: local
    driver_opts:
      type: none
      o: bind
      device: /home/hang/data/mariadb